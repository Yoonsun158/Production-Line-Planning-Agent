<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRD-Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif; }
        .chat-msg { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        @keyframes unitAppear { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }
        @keyframes drawLine { to { stroke-dashoffset:0; } }
        .unit-box { opacity:0; animation: unitAppear .4s ease forwards; animation-delay: calc(var(--i) * 40ms); }
        .unit-box rect { fill:#1e293b; stroke:#334155; stroke-width:1.5; transition: all .4s; }
        .unit-box text { fill:#94a3b8; transition: fill .4s; }
        .unit-box.active rect { fill:#064e3b; stroke:#10b981; stroke-width:2; }
        .unit-box.active text { fill:#d1fae5; }
        .unit-box.dimmed rect { fill:#0f172a; stroke:#1e293b; }
        .unit-box.dimmed text { fill:#475569; }
        .conn-line { stroke:#10b981; stroke-width:2; fill:none; stroke-dasharray:500; stroke-dashoffset:500; animation: drawLine .6s ease forwards; }
        .report-section h4 { color:#10b981; font-size:.95rem; font-weight:600; margin:14px 0 6px; }
        .report-section h4:first-child { margin-top:0; }
        .report-section p { color:#d1d5db; font-size:.82rem; line-height:1.7; margin:3px 0; }
        .report-section strong { color:#e2e8f0; }
        .report-section em { color:#6ee7b7; font-size:.78rem; }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-thumb { background:#334155; border-radius:4px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen overflow-hidden">
<div class="h-full flex flex-col p-4 max-w-[1600px] mx-auto">

    <!-- ===== Header ===== -->
    <header class="flex items-center justify-between mb-3 shrink-0">
        <h1 class="text-2xl font-bold text-emerald-400 flex items-center gap-2">
            ♻️ BRD-Agent
            <span id="hd-sub" class="text-base font-normal text-gray-300"></span>
        </h1>
        <div class="flex items-center gap-4">
            <span id="hd-status" class="text-xs text-gray-500"></span>
            <button id="lang-btn" onclick="toggleLang()"
                    class="text-xs bg-gray-800 hover:bg-gray-700 border border-gray-700 px-3 py-1.5 rounded-lg transition-colors"></button>
        </div>
    </header>

    <!-- ===== 3-Column Layout ===== -->
    <div class="grid grid-cols-12 gap-4 flex-1 min-h-0">

        <!-- LEFT: Report -->
        <section class="col-span-4 bg-gray-900 rounded-2xl p-5 flex flex-col min-h-0">
            <h2 id="sec-report" class="text-lg font-semibold mb-3 shrink-0"></h2>
            <div id="report-panel" class="flex-1 overflow-auto report-section text-sm">
                <p id="rpt-ph" class="text-gray-500"></p>
            </div>
        </section>

        <!-- MIDDLE: Input + Chat -->
        <section class="col-span-4 bg-gray-900 rounded-2xl p-5 flex flex-col min-h-0">
            <h2 id="sec-input" class="text-lg font-semibold mb-3 shrink-0"></h2>
            <div class="flex gap-2 mb-3 shrink-0">
                <input id="bat-in" type="text"
                       class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 transition-colors">
                <button id="send-btn" onclick="handleSend()"
                        class="bg-emerald-500 hover:bg-emerald-600 disabled:bg-gray-700 disabled:text-gray-500 disabled:cursor-not-allowed px-6 rounded-xl text-sm font-medium transition-colors"></button>
            </div>
            <div id="quick-bar" class="flex flex-wrap gap-1.5 mb-3 shrink-0"></div>
            <div id="chat-wrap" class="flex-1 bg-gray-950 rounded-xl p-4 overflow-auto border border-gray-800 min-h-0">
                <div id="chat-msgs" class="space-y-3 text-sm"></div>
            </div>
        </section>

        <!-- RIGHT: Visualization -->
        <section class="col-span-4 bg-gray-900 rounded-2xl p-5 flex flex-col min-h-0">
            <h2 id="sec-viz" class="text-lg font-semibold mb-3 shrink-0"></h2>
            <div id="viz-panel" class="flex-1 bg-slate-950 rounded-xl overflow-hidden min-h-0"></div>
            <p id="viz-foot" class="text-[10px] text-gray-600 mt-2 text-center shrink-0"></p>
        </section>
    </div>
</div>

<script>

// ===================== MOCK DATA =====================
const DB = {
    lfp: {

        report:{
            zh:`<h4>1. 电池名称</h4>
<p><strong>宁德时代 LFP 方形动力电池</strong></p>
<p>磷酸铁锂（LFP）化学体系，方形铝壳封装，能量密度中等，循环寿命长（>3000次），热稳定性优异。广泛用于新能源汽车动力系统。</p>
<h4>2. 产线搭建</h4>

<p><strong>路径：</strong>U1→U2→U3→U16→U4→U5→U6→U7→U8→U9→U11→U12→U14→U15→U18</p>

<p>首先进行收集分选(U1)和安全放电(U2)，随后拆解模块(U3)并评估梯次利用可能(U16)。不满足梯次利用条件的电池进入破碎(U4-U5)、多级分选(U6-U9)提取黑粉(U11)，最终通过湿法冶金(U12)回收锂、铁、磷等有价金属。全程配备尾气(U14)和废水(U15)处理。</p>
<p><em>风险等级：中 · 适合日处理 10 吨以上</em></p>`,
            en:`<h4>1. Battery Name</h4>
<p><strong>CATL LFP Prismatic Power Battery</strong></p>
<p>Lithium iron phosphate (LFP) chemistry, prismatic aluminum case, medium energy density, long cycle life (>3000 cycles), excellent thermal stability. Widely used in EV power systems.</p>
<h4>2. Production Line</h4>
<p><strong>Process Route:</strong> Echelon utilization priority + Hydrometallurgy</p>
<p><strong>Path:</strong> U1→U2→U3→U16→U4→U5→U6→U7→U8→U9→U11→U12→U14→U15→U18</p>
<p><strong>Expected Recovery Rate:</strong> 98% (Li >90%)</p>
<h4>3. Recovery Process</h4>
<p>Start with collection & sorting (U1) and safe discharge (U2), then module disassembly (U3) and echelon utilization assessment (U16). Batteries not suitable for reuse undergo crushing (U4-U5), multi-stage separation (U6-U9), black mass collection (U11), and hydrometallurgical recovery (U12) of Li, Fe, P. Equipped with exhaust (U14) and wastewater (U15) treatment throughout.</p>
<p><em>Risk Level: Medium · Suitable for >10 tons/day</em></p>`
        },
        steps:{
            zh:['🔍 步骤1：从RAG知识库检索 → 匹配LFP方形案例','📊 步骤2：分析化学体系（LFP）+ 形状（方形）+ 品牌（宁德时代）','🛠️ 步骤3：规划最优产线序列（含U16梯次利用）','📈 步骤4：生成产线连接路径可视化','📋 步骤5：输出结构化回收报告'],

        }
    },
    nmc: {
        path:['U1','U2','U3','U4','U5','U11','U12'],
        report:{
            zh:`<h4>1. 电池名称</h4>
<p><strong>三元锂 NMC 电池</strong></p>
<p>镍钴锰三元（NMC）化学体系，能量密度高，含镍钴等高价值金属。常见于高端电动汽车与储能系统。</p>
<h4>2. 产线搭建</h4>
<p><strong>工艺路线：</strong>湿法冶金为主（高镍价值）</p>
<p><strong>路径：</strong>U1→U2→U3→U4→U5→U11→U12</p>
<p><strong>预计回收率：</strong>98%+（Ni/Co/Mn/Li）</p>
<h4>3. 回收流程</h4>
<p>收集分选(U1)后安全放电(U2)并拆解模块(U3)。破碎(U4-U5)后收集黑粉(U11)，通过湿法冶金(U12)提取镍、钴、锰、锂等高价值金属。因含钴量高，经济价值显著。</p>`,
            en:`<h4>1. Battery Name</h4>
<p><strong>NMC Ternary Lithium Battery</strong></p>
<p>Nickel-cobalt-manganese (NMC) chemistry, high energy density, contains high-value metals Ni/Co. Common in premium EVs and energy storage systems.</p>
<h4>2. Production Line</h4>
<p><strong>Process Route:</strong> Hydrometallurgy-focused (high Ni value)</p>
<p><strong>Path:</strong> U1→U2→U3→U4→U5→U11→U12</p>
<p><strong>Expected Recovery Rate:</strong> 98%+ (Ni/Co/Mn/Li)</p>
<h4>3. Recovery Process</h4>
<p>After collection & sorting (U1), safe discharge (U2) and module disassembly (U3). Crushing (U4-U5) then black mass collection (U11), followed by hydrometallurgical extraction (U12) of high-value Ni, Co, Mn, Li. High economic value due to cobalt content.</p>`
        },
        steps:{
            zh:['🔍 步骤1：RAG检索NMC案例','📊 步骤2：识别高价值三元体系','🛠️ 步骤3：优先湿法冶金U12','📈 步骤4：生成产线连接图','📋 步骤5：输出回收报告'],
            en:['🔍 Step 1: RAG retrieval — NMC case matched','📊 Step 2: Identify high-value ternary system','🛠️ Step 3: Prioritize hydrometallurgy U12','📈 Step 4: Generate line diagram','📋 Step 5: Output recovery report']
        }
    },
    lead: {
        path:['U1','U2','U3','U9','U13'],
        report:{
            zh:`<h4>1. 电池名称</h4>
<p><strong>铅酸蓄电池</strong></p>
<p>传统铅酸化学体系，电极为铅及氧化铅，电解液为稀硫酸。广泛用于汽车启动、UPS 电源和电动自行车。</p>
<h4>2. 产线搭建</h4>
<p><strong>工艺路线：</strong>火法冶金</p>
<p><strong>路径：</strong>U1→U2→U3→U9→U13</p>
<p><strong>预计回收率：</strong>95%+</p>
<h4>3. 回收流程</h4>
<p>收集分选(U1)后放电(U2)并拆解(U3)分离铅板、隔板和酸液。通过比重分选(U9)提纯铅材料，最后火法冶金(U13)高温熔炼回收精铅。酸液需中和处理。</p>`,
            en:`<h4>1. Battery Name</h4>
<p><strong>Lead-acid Battery</strong></p>
<p>Traditional lead-acid chemistry with lead/lead oxide electrodes and dilute sulfuric acid electrolyte. Widely used in vehicle starting, UPS, and e-bikes.</p>
<h4>2. Production Line</h4>
<p><strong>Process Route:</strong> Pyrometallurgy</p>
<p><strong>Path:</strong> U1→U2→U3→U9→U13</p>
<p><strong>Expected Recovery Rate:</strong> 95%+</p>
<h4>3. Recovery Process</h4>
<p>After collection (U1), discharge (U2) and disassembly (U3) to separate lead plates, separators and acid. Gravity separation (U9) purifies lead material, then pyrometallurgical smelting (U13) recovers refined lead. Acid must be neutralized.</p>`
        },
        steps:{
            zh:['🔍 步骤1：RAG匹配铅酸案例','📊 步骤2：识别火法冶金路线','🛠️ 步骤3：重点U13高温熔炼','📈 步骤4：生成产线图','📋 步骤5：输出报告'],
            en:['🔍 Step 1: RAG match — lead-acid case','📊 Step 2: Identify pyrometallurgy route','🛠️ Step 3: Focus on U13 smelting','📈 Step 4: Generate line diagram','📋 Step 5: Output report']
        }
    },
    alkaline: {
        path:['U1','U4','U8','U12','U17'],
        report:{
            zh:`<h4>1. 电池名称</h4>
<p><strong>碱性锌锰电池</strong></p>
<p>锌锰化学体系，碱性电解液（KOH），一次性电池。大量用于家用电器遥控器、手电筒等日常消费品。</p>
<h4>2. 产线搭建</h4>
<p><strong>工艺路线：</strong>机械分选 + 湿法冶金</p>
<p><strong>路径：</strong>U1→U4→U8→U12→U17</p>
<p><strong>预计回收率：</strong>Zn 98% / Mn 95%</p>
<h4>3. 回收流程</h4>

            en:`<h4>1. Battery Name</h4>

<p>Zinc-manganese chemistry with alkaline electrolyte (KOH), primary battery. Massively used in consumer electronics — remotes, flashlights, toys.</p>
<h4>2. Production Line</h4>
<p><strong>Process Route:</strong> Mechanical separation + Hydrometallurgy</p>
<p><strong>Path:</strong> U1→U4→U8→U12→U17</p>
<p><strong>Expected Recovery Rate:</strong> Zn 98% / Mn 95%</p>
<h4>3. Recovery Process</h4>
<p>After collection (U1), direct coarse crushing (U4), air separation (U8) separates zinc shells and manganese powder, hydrometallurgy (U12) purifies metals, then material regeneration & pelletizing (U17). No safe discharge needed (minimal residual charge).</p>`
        },
        steps:{
            zh:['🔍 步骤1：RAG检索碱性案例','📊 步骤2：识别锌锰体系','🛠️ 步骤3：风选+湿法路线','📈 步骤4：生成产线图','📋 步骤5：输出报告'],

        }

// ===================== I18N APPLY =====================
function applyLang(){
    const $ = id => document.getElementById(id);
    $('hd-sub').textContent    = T('sub');
    $('hd-status').textContent = T('status');
    $('lang-btn').textContent  = T('langBtn');
    $('sec-report').textContent= T('secReport');
    $('sec-input').textContent = T('secInput');
    $('sec-viz').textContent   = T('secViz');
    $('send-btn').textContent  = T('send');
    $('bat-in').placeholder    = T('ph');
    $('viz-foot').textContent  = T('vizFoot');
    const rph = $('rpt-ph');
    if(rph) rph.textContent = T('rptPh');
    buildQuickBtns();
    renderViz();
    if(activePath) renderConnections(activePath);
    if(activeType && DB[activeType]){
        $('report-panel').innerHTML = DB[activeType].report[lang];
    }
}
function toggleLang(){
    lang = lang==='zh'?'en':'zh';
    document.documentElement.lang = lang==='zh'?'zh-CN':'en';
    applyLang();
}
function buildQuickBtns(){
    const c = document.getElementById('quick-bar');
    c.innerHTML='';
    T('quick').forEach(b=>{
        const el = document.createElement('button');
        el.className='text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded-full text-gray-300 transition-colors';
        el.textContent=b.label;
        el.onclick=()=>quickInput(b.val);
        c.appendChild(el);
    });
}

// ===================== VISUALIZATION (SVG) =====================
const SW=540, SH=720, COLS=3, ROWS=6, BW=138, BH=44;

function uPos(i){
    const cw=SW/COLS, ch=SH/ROWS;
    const col=i%COLS, row=Math.floor(i/COLS);
    return {
        cx: cw*(col+.5) + Math.sin(i*7.3+2.1)*14,
        cy: ch*(row+.5) + Math.cos(i*11.1+3.7)*10
    };
}

function renderViz(){
    let s = `<svg viewBox="0 0 ${SW} ${SH}" class="w-full h-full" style="max-height:100%">
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
  </marker>
</defs>
<g id="conn-layer"></g><g id="unit-layer">`;
    UNITS.forEach((u,i)=>{
        const {cx,cy}=uPos(i);
        const x=cx-BW/2, y=cy-BH/2;
        s+=`<g class="unit-box" data-uid="${u.id}" style="--i:${i}">
  <rect x="${x}" y="${y}" width="${BW}" height="${BH}" rx="8"/>
  <text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="12" font-weight="700">${u.id}</text>
  <text x="${cx}" y="${cy+13}" text-anchor="middle" font-size="9">${u[lang]}</text>
</g>`;
    });
    s+='</g></svg>';
    document.getElementById('viz-panel').innerHTML=s;
}

function edgePoint(cx,cy,tx,ty){
    const dx=tx-cx, dy=ty-cy;
    if(!dx&&!dy) return {x:cx,y:cy};
    const hw=BW/2+4, hh=BH/2+4;
    const sc=Math.min(hw/(Math.abs(dx)||.001), hh/(Math.abs(dy)||.001));
    return {x:cx+dx*sc, y:cy+dy*sc};
}

function renderConnections(path){
    activePath=path;
    const activeSet=new Set(path);
    document.querySelectorAll('.unit-box').forEach(g=>{
        const id=g.dataset.uid;
        g.classList.toggle('active', activeSet.has(id));
        g.classList.toggle('dimmed', !activeSet.has(id));
    });
    const cl=document.getElementById('conn-layer');
    if(!cl) return;
    let html='';
    for(let i=0;i<path.length-1;i++){
        const fi=UNITS.findIndex(u=>u.id===path[i]);
        const ti=UNITS.findIndex(u=>u.id===path[i+1]);
        if(fi<0||ti<0) continue;
        const f=uPos(fi), t=uPos(ti);
        const s=edgePoint(f.cx,f.cy,t.cx,t.cy);
        const e=edgePoint(t.cx,t.cy,f.cx,f.cy);
        const mx=(s.x+e.x)/2-(e.y-s.y)*.08;
        const my=(s.y+e.y)/2+(e.x-s.x)*.08;
        html+=`<path d="M${s.x.toFixed(1)},${s.y.toFixed(1)} Q${mx.toFixed(1)},${my.toFixed(1)} ${e.x.toFixed(1)},${e.y.toFixed(1)}"
                     class="conn-line" marker-end="url(#ah)" style="animation-delay:${i*80}ms"/>`;
    }
    cl.innerHTML=html;
}

// ===================== CHAT =====================
function addChat(role,text){
    const msgs=document.getElementById('chat-msgs');
    const d=document.createElement('div');
    d.className=`chat-msg flex ${role==='user'?'justify-end':'justify-start'}`;
    d.innerHTML=`<div class="${role==='user'?'bg-emerald-600 text-white':'bg-gray-800 text-gray-200'} max-w-[85%] rounded-2xl px-4 py-2.5 text-sm leading-relaxed">${text}</div>`;
    msgs.appendChild(d);
    document.getElementById('chat-wrap').scrollTop=9e9;
}

// ===================== REPORT =====================
function showReport(html){
    document.getElementById('report-panel').innerHTML=html;
}

// ===================== DIFY API (streaming) =====================
async function callDify(query){
    addChat('user',query);
    setBusy(true);
    addChat('agent',`<span class="text-emerald-400 italic">${T('thinking')}</span>`);
    try{
        const res=await fetch(`${DIFY_API_URL}/chat-messages`,{
            method:'POST',
            headers:{'Authorization':`Bearer ${DIFY_API_KEY}`,'Content-Type':'application/json'},
            body:JSON.stringify({inputs:{},query,response_mode:'streaming',conversation_id:convId,user:'brd-user'})
        });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const reader=res.body.getReader(), dec=new TextDecoder();
        let full='',buf='';
        removeLastChat();
        while(true){
            const {done,value}=await reader.read();
            if(done) break;
            buf+=dec.decode(value,{stream:true});
            const lines=buf.split('\n'); buf=lines.pop()||'';
            for(const ln of lines){
                if(!ln.startsWith('data: ')) continue;
                try{
                    const d=JSON.parse(ln.slice(6));
                    if(d.event==='agent_thought'&&d.thought) addChat('agent',`🤔 ${d.thought}`);
                    else if(d.event==='message') full+=d.answer||'';
                    else if(d.event==='message_end') convId=d.conversation_id||'';
                }catch(e){}
            }
        }
        parseDifyResult(full);
    }catch(err){
        removeLastChat();
        addChat('agent',`❌ ${lang==='zh'?'连接失败':'Connection failed'}: ${err.message}`);
    }finally{ setBusy(false); }
}

function removeLastChat(){
    const msgs=document.getElementById('chat-msgs');
    if(msgs.lastChild) msgs.lastChild.remove();
}

function parseDifyResult(text){
    const pathRe=text.match(/U\d+(?:\s*[→>]\s*U\d+)+/);
    if(pathRe){
        const p=pathRe[0].split(/\s*[→>]\s*/);
        renderConnections(p);
    }
    let rpt=text.replace(/```mermaid[\s\S]*?```/g,'').trim();
    if(rpt) showReport(`<div class="report-section">${rpt.replace(/\n/g,'<br>')}</div>`);
}

// ===================== MOCK SIMULATION =====================
async function simulate(type){
    activeType=type;
    const d=DB[type]||DB.lfp;
    const steps=d.steps[lang];
    document.getElementById('chat-msgs').innerHTML='';
    addChat('user',document.getElementById('bat-in').value||'-');
    addChat('agent',`<span class="text-emerald-400 italic">${T('thinking')}</span>`);
    for(let i=0;i<steps.length;i++){
        await new Promise(r=>setTimeout(r,550));
        if(i===0) removeLastChat();
        addChat('agent',steps[i]);
    }
    showReport(d.report[lang]);
    renderConnections(d.path);
}

// ===================== SEND LOGIC =====================
function setBusy(v){
    busy=v;
    document.getElementById('send-btn').disabled=v;
    document.getElementById('bat-in').disabled=v;
}

async function handleSend(){
    if(busy) return;
    const input=document.getElementById('bat-in').value.trim();
    if(!input) return;
    setBusy(true);
    activePath=null; activeType=null;
    renderViz();
    if(DIFY_API_KEY){
        await callDify(input);
    } else {
        let type='lfp';
        const lc=input.toLowerCase();
        if(lc.includes('lfp')||lc.includes('磷酸')||lc.includes('方形')||lc.includes('catl')) type='lfp';
        else if(lc.includes('nmc')||lc.includes('三元')||lc.includes('ternary')) type='nmc';
        else if(lc.includes('铅酸')||lc.includes('lead')) type='lead';
        else if(lc.includes('碱性')||lc.includes('锌锰')||lc.includes('alkaline')) type='alkaline';
        await simulate(type);
    }
    setBusy(false);
}

function quickInput(val){
    document.getElementById('bat-in').value=val;
    handleSend();
}

// ===================== ENTER KEY =====================
document.getElementById('bat-in').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); handleSend(); }
});

// ===================== INIT =====================
applyLang();
</script>
